<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=windows-1252">
<title>Ingreso al Sistema</title>
<meta name="GENERATOR" content="CodeCharge Studio 4.1.00.027">
<script language="JavaScript" type="text/javascript">
//Begin CCS script
//Include Common JSFunctions @1-D3B5F5BF
</script>
<script language="JavaScript" src="ClientI18N.php?file=Functions.js&amp;locale={res:CCS_LocaleID}" type="text/javascript" charset="utf-8"></script>
<script language="JavaScript" type="text/javascript">
//End Include Common JSFunctions

//_OnLoad @1-9C4F01C0
function _OnLoad()
{
    var result = true;
//End _OnLoad

//Set Focus @7-D20FE9BF
    if (document.forms["Login"] && document.forms["Login"].login) document.forms["Login"].login.focus();
//End Set Focus

//Close _OnLoad @1-BC33A33A
    return result;
}
//End Close _OnLoad

//bind_events @1-43A369D6
function bind_events() {
    if (functionExists("tdf_header_bind_events")) tdf_header_bind_events();
    if (functionExists("tdf_footer_bind_events")) tdf_footer_bind_events();
    addEventHandler("", "load", _OnLoad);
}
//End bind_events

window.onload = bind_events; //Assign bind_events @1-19F7B649

//End CCS script
</script>
<link rel="stylesheet" type="text/css" href="Styles/Simple_tdf/Style.css">
</head>
<body>
{tdf_header} 
<table border="1" width="100%" height="100%">
  <tr>
    <td>
      <!-- BEGIN Record Login -->
      <form id="Login" method="post" name="{HTMLFormName}" action="{Action}">
        <div align="center">
          <table border="0" cellspacing="0" cellpadding="0" align="center">
            <tr>
              <td valign="top">
                <table border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td><img id="Image1" name="Image1" alt="" align="middle" src="imagenes/login_arriba.jpg"></td>
                  </tr>
                </table>
 
                <table class="Record" cellspacing="0" cellpadding="0">
                  <!-- BEGIN Error -->
                  <tr class="Error">
                    <td colspan="2">{Error}</td>
                  </tr>
                  <!-- END Error -->
                  <tr class="Controls">
                    <th colspan="2"></th>
                  </tr>
 
                  <tr class="Controls">
                    <th><strong>Usuario</strong></th>
 
                    <td><input id="Loginlogin" value="{login}" maxlength="100" name="{login_Name}" size="20"></td>
                  </tr>
 
                  <tr class="Controls">
                    <th><strong>Contraseña</strong></th>
 
                    <td><input id="Loginpassword" value="{password}" maxlength="100" type="password" name="{password_Name}" size="20"></td>
                  </tr>
 
                  <tr class="Bottom">
                    <td colspan="2" align="right">
                      <p align="center">
                      <!-- BEGIN Button Button_DoLogin --><input id="LoginButton_DoLogin" class="Button" value="Ingresar" type="submit" name="{Button_Name}"><!-- END Button Button_DoLogin --></p>
                    </td>
                  </tr>
                </table>
                <img id="Image1" name="Image1" alt="" align="middle" src="imagenes/login_abajo.jpg"></td>
            </tr>
          </table>
        </div>
      </form>
      <!-- END Record Login --></td>
  </tr>
</table>
{tdf_footer} 
</body>
</html>
