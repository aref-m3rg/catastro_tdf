    function doIdentify(evt) {
      if( dijit.byId("info").checked ){
        // borra los elementos grÃficos
        map.graphics.clear();
        
        // referencia el punto en una variable
        var mp = evt.mapPoint;
        punto_x = mp.y;
        punto_y = mp.x;
        identifyParams.geometry = mp;
        identifyParams.mapExtent = map.extent; // debugMap();
        
        // agrega un punto al lugar donde se hace el click
        marker = new esri.symbol.SimpleMarkerSymbol(
          esri.symbol.SimpleMarkerSymbol.STYLE_CIRCLE,
          10,
          false,
          new dojo.Color([0,0,0,0.25])
        );
        map.graphics.add( new esri.Graphic(mp, marker) );

        identifyTask.execute( identifyParams, function( idResults ) {
          addToMap( idResults, evt );
        });
      }
    }



    function addToMap(idResults, evt) {
      layer1results = {displayFieldName:null,features:[]};
      layer2results = {displayFieldName:null,features:[]};
      for (var i=0, il=idResults.length; i<il; i++) {
         var idResult = idResults[i];
          if (!layer1results.displayFieldName) {layer1results.displayFieldName = idResult.displayFieldName};
          layer1results.features.push(idResult.feature);
          if (!layer2results.displayFieldName) {layer2results.displayFieldName = idResult.displayFieldName};
          layer2results.features.push(idResult.feature);
      }
      dijit.byId("layer1Tab").setContent(layerTabContent(layer1results,"layer1results"));
      dijit.byId("layer2Tab").setContent(layerTabContent(layer2results,"layer2results"));
      map.infoWindow.show(evt.screenPoint, map.getInfoWindowAnchor(evt.screenPoint));
    }

      function getAreaAndLength(geometry) {
        map.graphics.clear();
        var graphic = map.graphics.add(new esri.Graphic(geometry, new esri.symbol.SimpleFillSymbol(esri.symbol.SimpleFillSymbol.STYLE_SOLID, new esri.symbol.SimpleLineSymbol(esri.symbol.SimpleLineSymbol.STYLE_SOLID, new dojo.Color([0,0,255]), 2), new dojo.Color([0,0,255,0.45]))));
        var areasAndLengthParams = new esri.tasks.AreasAndLengthsParameters();
        areasAndLengthParams.lengthUnit = esri.tasks.GeometryService.UNIT_METER;
        areasAndLengthParams.areaUnit = esri.tasks.GeometryService.UNIT_METER;
        geometryService.simplify([geometry], function(simplifiedGeometries) { 
          areasAndLengthParams.polygons = simplifiedGeometries;
          geometryService.areasAndLengths(areasAndLengthParams);
         });
        geometryService.simplify([graphic], function(graphics){geometryService.areasAndLengths(graphics);});
      }

        document.getElementById("longitud").innerHTML = "&nbsp;Superficie: " + Math.round(result.areas[0]*100)/100 + " mý&nbsp;<br>&nbsp;PerÚmetro: " + Math.round(result.lengths[0]*100)/100 + " m&nbsp;";
        map.graphics.remove(map);
      }

      function doFindNome() {
        sec = trim(dojo.byId("sec").value);
        mzo = trim(dojo.byId("mzo").value);   
        par = trim(dojo.byId("par").value);
        var qs;
        var myString = "8,9";
        var mySplit = myString.split(",");

        queryTask = new esri.tasks.QueryTask("http://192.168.5.6:6080/arcgis/rest/services/interna/TDF_catastro_rgr/MapServer" + "/" + mySplit[0]);
        queryTask1 = new esri.tasks.QueryTask("http://192.168.5.6:6080/arcgis/rest/services/interna/TDF_catastro_rgr/MapServer" + "/" + mySplit[1]);
        query = new esri.tasks.Query();
        query.returnGeometry = true;

        qs = " 1=1 ";
        if(sec != "" || mzo != "" || par != ""){
                if(sec != ""){
                        qs = qs + " AND SEC = '" + dojo.byId("sec").value + "'";
                }
                if(mzo != ""){
                        qs = qs + " AND MZO = '" + dojo.byId("mzo").value + "'";
                }
                if(par != ""){
                        qs = qs + " AND PAR = '" + dojo.byId("par").value + "'";
                }
                query.where = qs ;
                if(document.getElementById('tipo_padron_parc_id').value == '1' ){
                        queryTask.execute(query,showResults2);
                }else if(document.getElementById('tipo_padron_parc_id').value == '2' ){
                        queryTask2.execute(query,showResults2);
                }else{
                djAlerta('Alerta','Debe seleccionar un Padron');
               }
        }else{ 
                djAlerta('Alerta','Ingrese parametros para la bºsqueda por Nomenclatura');
        }
      }

      function showResults2(results) {
            var graphic;
            var taxLotExtent;
            map.graphics.clear();
            if(results.features.length > 0){
                 for (var i=0, il=results.features.length; i<il; i++) {
                            graphic = results.features[i];
                            graphic.setSymbol(symbol);
                            map.graphics.add(graphic);
                            taxLotExtent = graphic.geometry.getExtent();
                            if(i == 0){
                                    xmin = taxLotExtent.xmin;
                                    ymin = taxLotExtent.ymin;
                                    xmax = taxLotExtent.xmax;
                                    ymax = taxLotExtent.ymax;
                            }
                            if(taxLotExtent.xmin < xmin){
                                    xmin = taxLotExtent.xmin;
                            }
                            if(taxLotExtent.ymin < ymin){
                                    ymin = taxLotExtent.ymin;
                            }
                            if(taxLotExtent.xmax > xmax){
                                    xmax = taxLotExtent.xmax;
                            }
                            if(taxLotExtent.ymax > ymax){
                                    ymax = taxLotExtent.ymax;
                            }
                }
                    var zoom = 100;
                    var newExt = new esri.geometry.Extent((xmin - zoom), (ymin - zoom), (xmax + zoom), (ymax + zoom), taxLotExtent.spatialReference);
                    map.setExtent(newExt);
            }else{
                    djAlerta('Aviso','No se encuentra la Nomenclatura como poligono en esta cartografÚa');
            }
        }

        function buscarGK(){
			var zoom = 50
            var xmin = parseInt(dojo.byId("gk_x").value) - zoom;
            var ymin = parseInt(dojo.byId("gk_y").value) - zoom;
            var xmax = parseInt(dojo.byId("gk_x").value) + zoom;
            var ymax = parseInt(dojo.byId("gk_y").value) + zoom;

				map.graphics.clear();
	            var newExt = new esri.geometry.Extent(xmin,ymin,xmax,ymax, new esri.SpatialReference());
	            map.setExtent(newExt);
	            var point = new esri.geometry.Point(parseInt(dojo.byId("gk_x").value), parseInt(dojo.byId("gk_y").value), new esri.SpatialReference());
	            var symbolGK = new esri.symbol.SimpleMarkerSymbol(esri.symbol.SimpleMarkerSymbol.STYLE_CIRCLE, 12, new esri.symbol.SimpleLineSymbol(esri.symbol.SimpleLineSymbol.STYLE_SOLID, new dojo.Color([255,0,0]), 2), new dojo.Color([255,255,255,0.9]));
	            var graphic = new esri.Graphic(point, symbolGK);
