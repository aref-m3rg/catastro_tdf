<link rel="stylesheet" type="text/css" href="../Styles/Simple_tdf/Style.css">
<!-- jQuery -->

<!-- Scripts -->
<script type="text/javascript">

  $(function() {

    /* EVENTOS */

    // Evento que muestra u oculta el campo de tipo de pers. jurid.

    $('#personastipo_persona_id').change( function() {

      valor = $(this).val();

      if ( valor == 1 ) {
        $('#tipo-pers-jurid').hide('fast');
        $('#pers-jurid-responsable').hide('fast');
      } else if ( valor == 2) {
        $('#tipo-pers-jurid').show('fast');
        $('#pers-jurid-responsable').show('fast');
      }

    });    



    /* GENERAL */

    // De acuerdo al valor del tipo de pers. oculta o muestra el campo de tipo

    personaTipoId = $('#personastipo_persona_id').val();

    if ( personaTipoId == 1 ) {
      $('#tipo-pers-jurid').hide();
      $('#pers-jurid-responsable').hide();
    } else if ( personaTipoId == 2) {
      $('#tipo-pers-jurid').show();
      $('#pers-jurid-responsable').show();
    }
    
  });

	function actualizar_denominacion(){
		document.getElementById('personaspersona_denominacion').value = document.getElementById('personaspersona_apellido').value + ' ' +document.getElementById('personaspersona_apellido').value;
	}

</script>
</head>
<body>
<div>
  {tdf_header}{tdf_menu} 
</div>
<br>
<!-- BEGIN Record personas -->
<form id="personas" method="post" name="{HTMLFormName}" action="{Action}">
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td> 
            <td class="th"><strong>Editar Personas </strong></td> 
            <td class="HeaderRight"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Record" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="2">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Controls">
            <td class="th">Apellido / Razón Social&nbsp;<font color="#ff0000">*</font></td> 
            <td><input id="personaspersona_apellido" name="{persona_apellido_Name}" value="{persona_apellido}" size="35">&nbsp;</td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspersona_denominacion">Nombre <font color="#ff0000">*</font></label></td> 
            <td><input id="personaspersona_nombre" name="{persona_nombre_Name}" value="{persona_nombre}" size="35"><input id="personaspersona_denominacion" name="{persona_denominacion_Name}" value="{persona_denominacion}" type="hidden"></td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personastipo_documento_id">Tipo y Nro. documento </label></td> 
            <td>
              <select id="personastipo_documento_id" name="{tipo_documento_id_Name}">
                <option selected value="">...</option>
                {tipo_documento_id_Options}
              </select>
 <input id="personaspersona_nro_doc" name="{persona_nro_doc_Name}" maxlength="20" value="{persona_nro_doc}" size="20">&nbsp;</td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspersona_cuit">CUIT</label></td> 
            <td><input id="personaspersona_cuit" name="{persona_cuit_Name}" maxlength="15" value="{persona_cuit}" size="15">&nbsp;</td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personastipo_persona_id">Figura legal&nbsp;<font color="#ff0000">*</font></label></td> 
            <td>
              <select id="personastipo_persona_id" name="{tipo_persona_id_Name}">
                <option selected value="">...</option>
                {tipo_persona_id_Options}
              </select>
 </td>
          </tr>
 
          <tr id="tipo-pers-jurid" class="Controls">
            <td class="th">Tipo de pers. jurídica&nbsp;</td> 
            <td>
              <select id="personasListBox1" name="{ListBox1_Name}">
                <option selected value="">Seleccionar...</option>
                {ListBox1_Options}
              </select>
 </td>
          </tr>
 
          <tr id="pers-jurid-responsable" class="Controls">
            <td class="th">Pers. responsable&nbsp;</td> 
            <td>{persona_relacionada}&nbsp; 
              <!-- BEGIN ImageLink add_persona --><a href="{add_persona}" style="VERTICAL-ALIGN: middle"><img style="BORDER-BOTTOM: 0px; BORDER-LEFT: 0px; BORDER-TOP: 0px; BORDER-RIGHT: 0px" src="../iconos/16x16/list-add.gif"></a><!-- END ImageLink add_persona -->
              <!-- BEGIN ImageLink remove_persona --><a href="{remove_persona}" style="VERTICAL-ALIGN: middle"><img style="BORDER-BOTTOM: 0px; BORDER-LEFT: 0px; BORDER-TOP: 0px; BORDER-RIGHT: 0px" src="../iconos/16x16/list-remove.gif"></a><!-- END ImageLink remove_persona -->&nbsp;<input id="personaspersona_relacionada_id" name="{persona_relacionada_id_Name}" value="{persona_relacionada_id}" type="hidden"></td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspersona_fecha_nac">Fecha Nacimiento</label></td> 
            <td><input id="personaspersona_fecha_nac" name="{persona_fecha_nac_Name}" maxlength="100" value="{persona_fecha_nac}" size="8">
              <!-- BEGIN DatePicker DatePicker_persona_fecha_nac --><a href="javascript:showDatePicker('{Name}','{FormName}','{DateControl}');" id="personasDatePicker_persona_fecha_nac"><img id="personasDatePicker_persona_fecha_nac_Image" border="0" alt="Show Date Picker" src="../Styles/Simple_tdf/Images/DatePicker.gif"></a><!-- END DatePicker DatePicker_persona_fecha_nac --></td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspais_id">País</label></td> 
            <td>
              <select id="personaspais_id" name="{pais_id_Name}">
                <option selected value="">...</option>
                {pais_id_Options}
              </select>
 <input id="personaspersona_f_proce" name="{persona_f_proce_Name}" value="{persona_f_proce}" type="hidden"></td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspersona_tel_movil">Tel. Móvil</label></td> 
            <td><input id="personaspersona_tel_movil" name="{persona_tel_movil_Name}" maxlength="20" value="{persona_tel_movil}" size="20"></td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspersona_email">E-mail</label></td> 
            <td><input id="personaspersona_email" name="{persona_email_Name}" maxlength="40" value="{persona_email}" size="40"></td>
          </tr>
 
          <tr class="Controls">
            <td class="th"><label for="personaspersona_conyuge">Cónyuge</label></td> 
            <td><input id="personaspersona_conyuge" name="{persona_conyuge_Name}" maxlength="100" value="{persona_conyuge}" size="40"></td>
          </tr>
 
          <tr class="Bottom">
            <td colspan="2" align="right"><font color="#ff0000">* campos obligatorios</font> 
              <!-- BEGIN Button Button_Update --><input id="personasButton_Update" class="Button" name="{Button_Name}" alt="Enviar" value="Actualizar" type="submit"><!-- END Button Button_Update -->
              <!-- BEGIN Button Button1 --><input id="personasButton1" class="Button" name="{Button_Name}" alt="Button1" value="Volver" type="submit"><!-- END Button Button1 --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
<!-- END Record personas -->{tdf_footer} 
</body>
</html>
