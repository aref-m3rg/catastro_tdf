<form name=slideform><table>
	<tr><td align=center bgcolor='white' width=200 height=150><img src='cart.gif' name='show'></td></tr><tr><td align=center ><select name='slide' onChange='change();'><option value='cart.gif' selected>Cart
	
		<option value='aat.gif'>AAT
		<option value='boat.gif'>Boat
		<option value='enterprise.gif'>Enterprise
		<option value='ewing.gif'>E-Wing
		<option value='f18.gif'>F-18
		<option value='klingon.gif'>Klingon
		<option value='landingcraft.gif'>Landing Craft
		<option value='hoverracer.gif'>Hover Racer
		<option value='sith.gif'>Sith
		
</select></td></tr><tr>
	<td align=center >
	<input type=button onClick='first();' value='|<' title='Inicio'>
	<input type=button onClick='previous();' value='<' title='previo'>
	<input type=button name='slidebutton' onClick='ap(this.value);' value='Start' title='AutoPlay'>
	<input type=button onClick='next();' value='>' title='proximo'>
	<input type=button onClick='last();' value='>|' title='fin'>
	</td>
</tr>
</table>
</form>
