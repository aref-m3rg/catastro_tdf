//piezastipo_tramites_idPTDependentListBox1 Start @49-808FAD26
function piezastipo_tramites_idPTDependentListBox1_start(sender) {
    var dependentElement = $("piezastipo_tramites_id" + sender.id.substring(16));
    var selectedValue = null;
    if (addEventHandler.isOnLoad)
        selectedValue = dependentElement.value;
    new Ajax.Request("../services/piezas_msa_altaNota_piezas_tipo_tramites_id_PTDependentListBox1.php?keyword=" + sender.value, {
        method: "get",
        requestHeaders: ['If-Modified-Since', new Date(0)],
        onSuccess: function(transport) {
            for (var i = dependentElement.options.length - 1; i > 0; i--) {
                var currentOption = dependentElement.options.item(i);
                if (currentOption.value != "") {
                    dependentElement.remove(i);
                }
            }
            var valueRows = eval(transport.responseText);
            for (var i = 0; i < valueRows.length; i++) {
                var newOption = new Option(valueRows[i]["1"], valueRows[i]["0"]);
                dependentElement.options[dependentElement.options.length] = newOption;
            } 
            if (CCGetParam(sender.name) == sender.value) {
                dependentElement.value = CCGetParam(dependentElement.name);
            }
            if (selectedValue)
                dependentElement.value = selectedValue;
        }, 
        onFailure: function(transport) {
            alert(transport.responseText);
        }
    });
}
//End piezastipo_tramites_idPTDependentListBox1 Start

//bind_events @1-8497ADA2
function bind_events() {
    if (functionExists("tdf_header_bind_events")) tdf_header_bind_events();
    if (functionExists("tdf_menu_bind_events")) tdf_menu_bind_events();
    if (functionExists("tdf_footer_bind_events")) tdf_footer_bind_events();
    addEventHandler("piezastramite_id", "change", piezastipo_tramites_idPTDependentListBox1_start);
    addEventHandler("piezastramite_id", "load", piezastipo_tramites_idPTDependentListBox1_start);
    addEventHandler("piezastramite_id", "load", piezastramite_id_OnLoad);
    addEventHandler("piezaspieza_txt", "load", piezaspieza_txt_OnLoad);
    addEventHandler("piezasButton1", "click", piezasButton1_OnClick);
}
//End bind_events

window.onload = bind_events; //Assign bind_events @1-19F7B649

//End CCS script
