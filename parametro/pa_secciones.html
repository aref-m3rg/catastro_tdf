<script language="JavaScript" type="text/javascript">

//seccionesCancel_OnClick @15-4BB4658A
function seccionesCancel_OnClick()
{
    disableValidation = true;
}
//End seccionesCancel_OnClick

//bind_events @1-8A817CBB
function bind_events() {
    if (functionExists("tdf_footer_bind_events")) tdf_footer_bind_events();
    if (functionExists("tdf_header_bind_events")) tdf_header_bind_events();
    if (functionExists("tdf_menu_bind_events")) tdf_menu_bind_events();
    addEventHandler("seccionesCancel", "click", seccionesCancel_OnClick);
}
//End bind_events

window.onload = bind_events; //Assign bind_events @1-19F7B649

<p>{tdf_header}{tdf_menu}</p>
<p>&nbsp;</p>
<!-- BEGIN Record seccionesSearch -->
<form id="seccionesSearch" method="post" name="{HTMLFormName}" action="{Action}">
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td> 
            <th>Buscar</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Record" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="2">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Controls">
            <th>Descripción</th>
 
            <td><input id="seccionesSearchs_seccion_descrip" name="{s_seccion_descrip_Name}" maxlength="64" value="{s_seccion_descrip}" size="50"></td>
          </tr>
 
          <tr class="Controls">
            <th>Estado</th>
 
            <td>
              <select id="seccionesSearchs_tipo_estado_id" name="{s_tipo_estado_id_Name}">
                <option selected value="">(Todos)</option>
                {s_tipo_estado_id_Options}
              </select>
 </td>
          </tr>
 
          <tr class="Bottom">
            <td colspan="2" align="right">
              <!-- BEGIN Button Button_DoSearch --><input id="seccionesSearchButton_DoSearch" class="Button" name="{Button_Name}" value="Buscar" type="submit"><!-- END Button Button_DoSearch --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
<!-- END Record seccionesSearch --><br>
<!-- BEGIN EditableGrid secciones -->
<form id="secciones" method="post" name="{HTMLFormName}" action="{Action}">
  <input name="FormState" value="{FormState}" type="hidden">{FormScript} 
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td> 
            <th>Listado de secciones</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Grid" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="3">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Caption">
            <th>Descripción</th>
 
            <th>Estado</th>
 
            <th>Borrar</th>
          </tr>
 
          <!-- BEGIN Row -->
          <!-- BEGIN RowError -->
          <tr class="Error">
            <td colspan="3">{Error}</td>
          </tr>
          <!-- END RowError -->
          <tr class="Row">
            <td><input id="seccionesseccion_descrip_{secciones:rowNumber}" name="{seccion_descrip_Name}" maxlength="64" value="{seccion_descrip}" size="50"></td> 
            <td><select name="{tipo_estado_id_Name}" id="seccionestipo_estado_id_{secciones:rowNumber}">
  <option value="">Seleccionar...</option>
  {tipo_estado_id_Options}
</select>
</td> 
            <td>
              <!-- BEGIN CheckBox CheckBox_Delete --><input id="seccionesCheckBox_Delete_{secciones:rowNumber}" name="{CheckBox_Delete_Name}" value="1" type="checkbox" {CheckBox_Delete}><!-- END CheckBox CheckBox_Delete -->&nbsp;</td>
          </tr>
 <!-- END Row -->
          <!-- BEGIN NoRecords -->
          <tr class="NoRecords">
            <td colspan="3">No hay registros</td>
          </tr>
          <!-- END NoRecords -->
          <tr class="Footer">
            <td style="TEXT-ALIGN: right" colspan="3">
              <!-- BEGIN Navigator Navigator -->
              <!-- BEGIN Page_Parameter --><input name="{Name}" value="{Value}" type="hidden"><!-- END Page_Parameter -->Per page: 
              <select onchange="CCChangeSize(this, '{FormName}')" name="{FormName}PageSize">
                <option selected value="">-</option>
 {PageSize_Options}
              </select>
 
              <!-- BEGIN First_On --><a href="{First_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/First.gif"></a> <!-- END First_On -->
              <!-- BEGIN First_Off --><img border="0" src="../Styles/{CCS_Style}/Images/FirstOff.gif"><!-- END First_Off -->
              <!-- BEGIN Prev_On --><a href="{Prev_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/Prev.gif"></a> <!-- END Prev_On -->
              <!-- BEGIN Prev_Off --><img border="0" src="../Styles/{CCS_Style}/Images/PrevOff.gif"><!-- END Prev_Off -->&nbsp;{Page_Number} de&nbsp;{Total_Pages}&nbsp; 
              <!-- BEGIN Next_On --><a href="{Next_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/Next.gif"></a> <!-- END Next_On -->
              <!-- BEGIN Next_Off --><img border="0" src="../Styles/{CCS_Style}/Images/NextOff.gif"><!-- END Next_Off -->
              <!-- BEGIN Last_On --><a href="{Last_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/Last.gif"></a> <!-- END Last_On -->
              <!-- BEGIN Last_Off --><img border="0" src="../Styles/{CCS_Style}/Images/LastOff.gif"><!-- END Last_Off --><!-- END Navigator Navigator -->
              <!-- BEGIN Button Button_Submit --><input id="seccionesButton_Submit" class="Button" name="{Button_Name}" value="Enviar" type="submit"><!-- END Button Button_Submit -->
              <!-- BEGIN Button Cancel --><input id="seccionesCancel" class="Button" name="{Button_Name}" value="Cancelar" type="submit"><!-- END Button Cancel --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
<!-- END EditableGrid secciones --><br>
<p>&nbsp;</p>
<p>{tdf_footer}</p>
