<!-- BEGIN Record localidadesSearch -->
<form id="localidadesSearch" method="post" name="{HTMLFormName}" action="{Action}">
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td> 
            <th>Buscar</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Record" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="2">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Controls">
            <th>Nombre</th>
 
            <td><input id="localidadesSearchs_localidad_nombre" name="{s_localidad_nombre_Name}" maxlength="25" value="{s_localidad_nombre}" size="25"></td>
          </tr>
 
          <tr class="Controls">
            <th>Departamento</th>
 
            <td>
              <select id="localidadesSearchs_departamento_id" name="{s_departamento_id_Name}">
                <option selected value="">(Todos)</option>
                {s_departamento_id_Options}
              </select>
 </td>
          </tr>
 
          <tr class="Bottom">
            <td colspan="2" align="right">
              <!-- BEGIN Button Button_DoSearch --><input id="localidadesSearchButton_DoSearch" class="Button" name="{Button_Name}" value="Buscar" type="submit"><!-- END Button Button_DoSearch --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
<!-- END Record localidadesSearch --><br>
<!-- BEGIN EditableGrid localidades -->
<form id="localidades" method="post" name="{HTMLFormName}" action="{Action}">
  <input name="FormState" value="{FormState}" type="hidden">{FormScript} 
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td> 
            <th>Listado de localidades</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Grid" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->

          </tr>

          <tr class="Caption">
            <th>Nombre</th>
 
            <th>Departamento</th>

            <th>Borrar</th>
          </tr>
 
          <!-- BEGIN Row -->
          <!-- BEGIN RowError -->
          <tr class="Error">
            <td colspan="4">{Error}</td>
          </tr>
          <!-- END RowError -->
          <tr class="Row">
            <td><input id="localidadeslocalidad_nombre_{localidades:rowNumber}" name="{localidad_nombre_Name}" maxlength="25" value="{localidad_nombre}" size="25"><input id="localidadeslocalidad_id" name="{localidad_id_Name}" value="{localidad_id}" type="hidden"></td> 
            <td>
              <select id="localidadesdepartamento_id_{localidades:rowNumber}" name="{departamento_id_Name}">
                <option selected value="">Seleccionar...</option>
                {departamento_id_Options}
              </select>
 </td> 
            <td><input id="localidadeslocalidad_abrev_{localidades:rowNumber}" name="{localidad_abrev_Name}" maxlength="10" value="{localidad_abrev}" size="10"></td> 
            <td>
              <!-- BEGIN CheckBox CheckBox_Delete --><input id="localidadesCheckBox_Delete_{localidades:rowNumber}" name="{CheckBox_Delete_Name}" value="1" type="checkbox" {CheckBox_Delete}><!-- END CheckBox CheckBox_Delete -->&nbsp;</td>
          </tr>
 <!-- END Row -->
          <!-- BEGIN NoRecords -->
          <tr class="NoRecords">
            <td colspan="4">No hay registros</td>
          </tr>
          <!-- END NoRecords -->
          <tr class="Footer">
            <td style="TEXT-ALIGN: right" colspan="4">
              <!-- BEGIN Navigator Navigator -->
              <!-- BEGIN Page_Parameter --><input name="{Name}" value="{Value}" type="hidden"><!-- END Page_Parameter -->Per page: 
              <select onchange="CCChangeSize(this, '{FormName}')" name="{FormName}PageSize">
                <option selected value="">-</option>
 {PageSize_Options}
              </select>
 
              <!-- BEGIN First_On --><a href="{First_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/First.gif"></a> <!-- END First_On -->
              <!-- BEGIN First_Off --><img border="0" src="../Styles/{CCS_Style}/Images/FirstOff.gif"><!-- END First_Off -->
              <!-- BEGIN Prev_On --><a href="{Prev_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/Prev.gif"></a> <!-- END Prev_On -->
              <!-- BEGIN Prev_Off --><img border="0" src="../Styles/{CCS_Style}/Images/PrevOff.gif"><!-- END Prev_Off -->&nbsp;{Page_Number} de&nbsp;{Total_Pages}&nbsp; 
              <!-- BEGIN Next_On --><a href="{Next_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/Next.gif"></a> <!-- END Next_On -->
              <!-- BEGIN Next_Off --><img border="0" src="../Styles/{CCS_Style}/Images/NextOff.gif"><!-- END Next_Off -->
              <!-- BEGIN Last_On --><a href="{Last_URL}"><img border="0" src="../Styles/{CCS_Style}/Images/Last.gif"></a> <!-- END Last_On -->
              <!-- BEGIN Last_Off --><img border="0" src="../Styles/{CCS_Style}/Images/LastOff.gif"><!-- END Last_Off --><!-- END Navigator Navigator -->
              <!-- BEGIN Button Button_Submit --><input id="localidadesButton_Submit" class="Button" name="{Button_Name}" value="Enviar" type="submit"><!-- END Button Button_Submit -->
              <!-- BEGIN Button Cancel --><input id="localidadesCancel" class="Button" name="{Button_Name}" value="Cancelar" type="submit"><!-- END Button Cancel --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
