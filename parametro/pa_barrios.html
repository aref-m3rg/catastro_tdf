<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=windows-1252">
<title>Listado de barrios</title>
<meta name="GENERATOR" content="CodeCharge Studio 4.3.00.7676">
<link rel="stylesheet" type="text/css" href="../Styles/Simple_tdf/Style.css">
<script language="JavaScript" type="text/javascript">
//Begin CCS script
//Include Common JSFunctions @1-9722A627
</script>
<script language="JavaScript" src="../ClientI18N.php?file=Functions.js&amp;locale={res:CCS_LocaleID}" type="text/javascript" charset="utf-8"></script>
<script language="JavaScript" type="text/javascript">
//End Include Common JSFunctions

//barriosCancel_OnClick @15-EC45A768
function barriosCancel_OnClick()
{
    disableValidation = true;
}
//End barriosCancel_OnClick

//bind_events @1-B3726AE4
function bind_events() {
    if (functionExists("tdf_header_bind_events")) tdf_header_bind_events();
    if (functionExists("tdf_menu_bind_events")) tdf_menu_bind_events();
    if (functionExists("tdf_footer_bind_events")) tdf_footer_bind_events();
    addEventHandler("barriosCancel", "click", barriosCancel_OnClick);
}
//End bind_events

window.onload = bind_events; //Assign bind_events @1-19F7B649

//End CCS script
</script>
</head>
<body>
<p>{tdf_header}{tdf_menu}</p>
<p>&nbsp;</p>
<!-- BEGIN Record barriosSearch -->
<form id="barriosSearch" method="post" name="{HTMLFormName}" action="{Action}">
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/Simple/Images/Spacer.gif"></td> 
            <th>Buscar</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/Simple/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Record" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="2">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Controls">
            <th>Nombre</th>
 
            <td><input id="barriosSearchs_barrio_nombre" name="{s_barrio_nombre_Name}" maxlength="50" value="{s_barrio_nombre}" size="50"></td>
          </tr>
 
          <tr class="Bottom">
            <td colspan="2" align="right">
              <!-- BEGIN Button Button_DoSearch --><input id="barriosSearchButton_DoSearch" class="Button" name="{Button_Name}" value="Buscar" type="submit"><!-- END Button Button_DoSearch --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
<!-- END Record barriosSearch --><br>
<!-- BEGIN EditableGrid barrios -->
<form id="barrios" method="post" name="{HTMLFormName}" action="{Action}">
  <input name="FormState" value="{FormState}" type="hidden">{FormScript} 
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/Simple/Images/Spacer.gif"></td> 
            <th>Listado de barrios</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/Simple/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Grid" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="3">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Row">
            <td colspan="3">Total de Registros:&nbsp;{barrios_TotalRecords}</td>
          </tr>
 
          <tr class="Caption">
            <th>Nombre</th>
 
            <th>Estado</th>
 
            <th>Borrar</th>
          </tr>
 
          <!-- BEGIN Row -->
          <!-- BEGIN RowError -->
          <tr class="Error">
            <td colspan="3">{Error}</td>
          </tr>
          <!-- END RowError -->
          <tr class="Row">
            <td><input id="barriosbarrio_nombre_{barrios:rowNumber}" name="{barrio_nombre_Name}" maxlength="50" value="{barrio_nombre}" size="50"></td> 
            <td><select name="{barrio_codigo_calle_Name}" id="barriosbarrio_codigo_calle_{barrios:rowNumber}">
  <option value="">Seleccionar...</option>
  {barrio_codigo_calle_Options}
</select>
</td> 
            <td>
              <!-- BEGIN CheckBox CheckBox_Delete --><input id="barriosCheckBox_Delete_{barrios:rowNumber}" name="{CheckBox_Delete_Name}" value="1" type="checkbox" {CheckBox_Delete}><!-- END CheckBox CheckBox_Delete -->&nbsp;</td>
          </tr>
 <!-- END Row -->
          <!-- BEGIN NoRecords -->
          <tr class="NoRecords">
            <td colspan="3">No hay registros</td>
          </tr>
          <!-- END NoRecords -->
          <tr class="Footer">
            <td style="TEXT-ALIGN: right" colspan="3">
              <!-- BEGIN Navigator Navigator -->
              <!-- BEGIN Page_Parameter --><input name="{Name}" value="{Value}" type="hidden"><!-- END Page_Parameter -->Per page: 
              <select onchange="CCChangeSize(this, '{FormName}')" name="{FormName}PageSize">
                <option selected value="">-</option>
 {PageSize_Options}
              </select>
 
              <!-- BEGIN First_On --><a href="{First_URL}"><img border="0" src="../Styles/Simple/Images/First.gif"></a> <!-- END First_On -->
              <!-- BEGIN First_Off --><img border="0" src="../Styles/Simple/Images/FirstOff.gif"><!-- END First_Off -->
              <!-- BEGIN Prev_On --><a href="{Prev_URL}"><img border="0" src="../Styles/Simple/Images/Prev.gif"></a> <!-- END Prev_On -->
              <!-- BEGIN Prev_Off --><img border="0" src="../Styles/Simple/Images/PrevOff.gif"><!-- END Prev_Off -->&nbsp;{Page_Number} de&nbsp;{Total_Pages}&nbsp; 
              <!-- BEGIN Next_On --><a href="{Next_URL}"><img border="0" src="../Styles/Simple/Images/Next.gif"></a> <!-- END Next_On -->
              <!-- BEGIN Next_Off --><img border="0" src="../Styles/Simple/Images/NextOff.gif"><!-- END Next_Off -->
              <!-- BEGIN Last_On --><a href="{Last_URL}"><img border="0" src="../Styles/Simple/Images/Last.gif"></a> <!-- END Last_On -->
              <!-- BEGIN Last_Off --><img border="0" src="../Styles/Simple/Images/LastOff.gif"><!-- END Last_Off --><!-- END Navigator Navigator -->
              <!-- BEGIN Button Button_Submit --><input id="barriosButton_Submit" class="Button" name="{Button_Name}" value="Enviar" type="submit"><!-- END Button Button_Submit -->
              <!-- BEGIN Button Cancel --><input id="barriosCancel" class="Button" name="{Button_Name}" value="Cancelar" type="submit"><!-- END Button Cancel --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>
<!-- END EditableGrid barrios --><br>
<p>&nbsp;</p>
<p>{tdf_footer}</p>
</body>
</html>
