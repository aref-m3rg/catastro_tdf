<!-- BEGIN Record tipos_serviciosSearch -->
<form id="tipos_serviciosSearch" method="post" name="{HTMLFormName}" action="{Action}">
  <table border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td valign="top">
        <table class="Header" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="HeaderLeft"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td> 
            <th>Tipos Servicios Buscar</th>
 
            <td class="HeaderRight"><img border="0" src="../Styles/{CCS_Style}/Images/Spacer.gif"></td>
          </tr>
        </table>
 
        <table class="Record" cellspacing="0" cellpadding="0">
          <!-- BEGIN Error -->
          <tr class="Error">
            <td colspan="2">{Error}</td>
          </tr>
          <!-- END Error -->
          <tr class="Controls">
            <th>Descripción</th>
 
            <td><input id="tipos_serviciosSearchs_tipo_servicio_descrip" name="{s_tipo_servicio_descrip_Name}" maxlength="30" value="{s_tipo_servicio_descrip}" size="30"></td>
          </tr>
 
          <tr class="Controls">
            <th>Estado</th>
 
            <td>
              <select id="tipos_serviciosSearchs_tipo_estado_id" name="{s_tipo_estado_id_Name}">
                <option selected value="">(Todos)</option>
                {s_tipo_estado_id_Options}
              </select>
 </td>
          </tr>
 
          <tr class="Bottom">
            <td><a href="{ClearParameters_Src}" id="tipos_serviciosSearchClearParameters">Limpiar</a></td> 
            <td align="right">
              <!-- BEGIN Button Button_DoSearch --><input id="tipos_serviciosSearchButton_DoSearch" class="Button" name="{Button_Name}" value="Buscar" type="submit"><!-- END Button Button_DoSearch --></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</form>

<!-- BEGIN EditableGrid tipos_servicios -->
<form id="tipos_servicios" method="post" name="{HTMLFormName}" action="{Action}">

    <tr>
      <td valign="top">

              <select id="tipos_serviciostipo_estado_id_{tipos_servicios:rowNumber}" name="{tipo_estado_id_Name}">
                <option selected value="">Seleccionar...</option>
                {tipo_estado_id_Options}
              </select>
 </td> 
            <td>
              <!-- BEGIN CheckBox CheckBox_Delete --><input id="tipos_serviciosCheckBox_Delete_{tipos_servicios:rowNumber}" name="{CheckBox_Delete_Name}" value="1" type="checkbox" {CheckBox_Delete}><!-- END CheckBox CheckBox_Delete -->&nbsp;</td>
          </tr>
 <!-- END Row -->

          </tr>
          <!-- END NoRecords -->
          <tr class="Footer">

              <!-- BEGIN Button Cancel --><input id="tipos_serviciosCancel" class="Button" name="{Button_Name}" value="Cancelar" type="submit"><!-- END Button Cancel --></td>
          </tr>
        </table>
      </td>
