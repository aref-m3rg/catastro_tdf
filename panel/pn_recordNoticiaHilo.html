<head>

<script language="JavaScript" type="text/javascript">
//End Include User Scripts

//hilonoti_hilo_texto_OnLoad @40-EBF4CBF1
function hilonoti_hilo_texto_OnLoad()
{
    var result = true;
//End hilonoti_hilo_texto_OnLoad

//Attach FCKeditor @41-A4885E60
    var hilonoti_hilo_texto_FCK = new FCKeditor(this.getAttribute("id"));
    hilonoti_hilo_texto_FCK.BasePath = "/catastro_tdf_desa/FCKeditor/";
    hilonoti_hilo_texto_FCK.ToolbarSet = "MyToolbar";
    hilonoti_hilo_texto_FCK.Height = "100%";
    hilonoti_hilo_texto_FCK.Width = "100%";
    hilonoti_hilo_texto_FCK.ReplaceTextarea();
//End Attach FCKeditor

//Close hilonoti_hilo_texto_OnLoad @40-BC33A33A
    return result;
}
//End Close hilonoti_hilo_texto_OnLoad

//bind_events @1-CAB83FE3
function bind_events() {
    if (functionExists("tdf_header_bind_events")) tdf_header_bind_events();
    if (functionExists("tdf_menu_bind_events")) tdf_menu_bind_events();
    if (functionExists("tdf_footer_bind_events")) tdf_footer_bind_events();
    addEventHandler("hilonoti_hilo_texto", "load", hilonoti_hilo_texto_OnLoad);
}
//End bind_events

window.onload = bind_events; //Assign bind_events @1-19F7B649

//End CCS script
</script>
<style type="text/css">
<!--
.Estilo1   { font-size: 15px; font-weight: bold; }
-->
</style>
<link rel="stylesheet" type="text/css" href="../Styles/Simple_tdf/Style.css">
</head>
<body>
{tdf_header}{tdf_menu}&nbsp; 
<table border="0" cellspacing="1" cellpadding="1" width="100%">
  <tr>
    <td>
      <!-- BEGIN Grid noticias_noticias_categor -->
      <table border="0" cellspacing="0" cellpadding="0" width="100%">
        <tr>
          <td valign="top">
            <table class="Header" border="0" cellspacing="0" cellpadding="0">
              <tr>
                <td class="HeaderLeft"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td> 
                <td class="th"><strong>Ver Comentario</strong></td> 
                <td class="HeaderRight"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td>
              </tr>
            </table>
 
            <table class="Grid" cellspacing="0" cellpadding="0">
              <!-- BEGIN Row -->
              <tr class="Row">
                <td rowspan="2"><img id="noticias_noticias_categornoti_cat_icono" name="noticias_noticias_categornoti_cat_icono" alt=" " align="absMiddle" src="{noti_cat_icono}"></td> 
                <td colspan="5">
                  <div class="Estilo1" align="center">
                    (#{noticia_id})&nbsp;{noticias_asunto} 
                  </div>
                </td> 
                <td><a href="{ImageLink1}" id="noticias_noticias_categorImageLink1_{noticias_noticias_categor:rowNumber}"><img style="BORDER-BOTTOM: 0px; BORDER-LEFT: 0px; BORDER-TOP: 0px; BORDER-RIGHT: 0px" alt="{ImageLink1}" src="../iconos/22x22/go-previous.gif"></a>&nbsp;Volver</td>
              </tr>
 
              <tr class="Row">
                <td class="th">
                  <div align="right">
                    Fecha 
                  </div>
                </td> 
                <td>
                  <div align="left">
                    {noticias_fecha} 
                  </div>
                </td> 
                <td class="th">
                  <div align="right">
                    Categoria 
                  </div>
                </td> 
                <td style="TEXT-ALIGN: left">
                  <div align="left">
                    {noti_cat_abrev} 
                  </div>
                </td> 
                <td class="th">
                  <div align="right">
                    Autor&nbsp; 
                  </div>
                </td> 
                <td>
                  <div align="left">
                    {usuario_nombre} 
                  </div>
                </td>
              </tr>
 
              <tr class="Row">
                <td colspan="7">{noticias_texto}</td>
              </tr>
 <!-- END Row -->
            </table>
          </td>
        </tr>
      </table>
      <!-- END Grid noticias_noticias_categor --></td>
  </tr>
 
  <tr>
    <td>
      <table class="Header" border="0" cellspacing="0" cellpadding="0">
        <tr>
          <td class="HeaderLeft"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td> 
          <td class="th"><strong>Seguimientos de este comentario</strong></td> 
          <td class="HeaderRight"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td>
        </tr>
      </table>
    </td>
  </tr>
 
  <tr>
    <td>{iframe}</td>
  </tr>
 
  <tr>
    <td>
      <!-- BEGIN Record hilo -->
      <form id="hilo" method="post" name="{HTMLFormName}" action="{Action}">
        <table border="0" cellspacing="0" cellpadding="0" width="100%">
          <tr>
            <td valign="top">
              <table class="Header" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td class="HeaderLeft"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td> 
                  <td class="th"><strong>Agregar Seguimiento</strong></td> 
                  <td class="HeaderRight"><img border="0" alt="" src="../Styles/Simple_tdf/Images/Spacer.gif"></td>
                </tr>
              </table>
 
              <table class="Record" cellspacing="0" cellpadding="0">
                <!-- BEGIN Error -->
                <tr class="Error">
                  <td colspan="2">{Error}</td>
                </tr>
                <!-- END Error -->
                <tr class="Controls">
                  <td class="th" width="5%">Estado:&nbsp; </td> 
                  <td width="95%">
                    <select id="hilonot_h_est_id" name="{not_h_est_id_Name}">
                      {not_h_est_id_Options}
                    </select>
 &nbsp;</td>
                </tr>
 
                <tr class="Controls">
                  <td colspan="2"><textarea style="WIDTH: 100%; HEIGHT: 100%" id="hilonoti_hilo_texto" rows="3" cols="90" name="{noti_hilo_texto_Name}">{noti_hilo_texto}</textarea></td>
                </tr>
 
                <tr class="Bottom">
                  <td colspan="2" align="right">
                    <!-- BEGIN Button Button_Insert --><input id="hiloButton_Insert" class="Button" value="Agregar" alt="Agregar" type="submit" name="{Button_Name}"><!-- END Button Button_Insert -->
                    <!-- BEGIN Button Button_Update --><input id="hiloButton_Update" class="Button" value="Acualizar" alt="Enviar" type="submit" name="{Button_Name}"><!-- END Button Button_Update --></td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </form>
      <!-- END Record hilo --></td>
  </tr>
</table>
{tdf_footer} 
</body>
</html>
