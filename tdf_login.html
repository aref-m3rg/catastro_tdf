<script language="JavaScript" type="text/javascript">
//End Include Common JSFunctions

//LoginButton_DoLogin_OnClick @3-0E92872E
function LoginButton_DoLogin_OnClick()
{
    var result = true;
//End LoginButton_DoLogin_OnClick

//Custom Code @12-2A29BDB7


    /* Encripta el password
	---------------------------------------------------- */
	document.getElementById('Loginpassword').value = hex_md5(document.getElementById('Loginpassword').value);
    // debug: alert(document.getElementById('Loginpassword').value);


//End Custom Code

//Close LoginButton_DoLogin_OnClick @3-BC33A33A
    return result;
}
//End Close LoginButton_DoLogin_OnClick

//Login_OnSubmit @2-613D4BD5
function Login_OnSubmit()
{
    var result = true;
//End Login_OnSubmit

//Custom Code @11-2A29BDB7
    // -------------------------
    // Write your own code here.
        //document.getElementById('Loginpassword').value = hex_md5(document.getElementById('Loginpassword').value);
    // -------------------------
//End Custom Code

//Close Login_OnSubmit @2-BC33A33A
    return result;
}
//End Close Login_OnSubmit

//_OnLoad @1-9C4F01C0
function _OnLoad()
{
    var result = true;
//End _OnLoad

//Set Focus @7-D20FE9BF
    if (document.forms["Login"] && document.forms["Login"].login) document.forms["Login"].login.focus();
//End Set Focus

//Close _OnLoad @1-BC33A33A
    return result;
}
//End Close _OnLoad

//bind_events @1-AA8C7CD8
function bind_events() {
    if (functionExists("tdf_header_bind_events")) tdf_header_bind_events();
    if (functionExists("tdf_footer_bind_events")) tdf_footer_bind_events();
    addEventHandler("LoginButton_DoLogin", "click", LoginButton_DoLogin_OnClick);
    addEventHandler("Login", "submit", Login_OnSubmit);
    addEventHandler("", "load", _OnLoad);
}
//End bind_events

window.onload = bind_events; //Assign bind_events @1-19F7B649

//End CCS script
</script>
<link rel="stylesheet" type="text/css" href="Styles/Simple_tdf/Style.css">
<link rel="stylesheet" type="text/css" href="{page:pathToRoot}Styles/common.css">
</head>
<body>

<div>
	{tdf_header} 
</div>
<table border="1" width="100%" height="100%">
  <tr>
    <td>
      <!-- BEGIN Record Login -->
      <form id="Login" method="post" name="{HTMLFormName}" action="{Action}">
        <div align="center">
          <table border="0" cellspacing="0" cellpadding="0" align="center">
            <tr>
              <td valign="top">
                <table border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td><img id="Image1" name="Image1" alt="" align="middle" src="imagenes/login_arriba.jpg"></td>
                  </tr>
                </table>
 
                <table class="Record" cellspacing="0" cellpadding="0">
                  <!-- BEGIN Error -->
                  <tr class="Error">
                    <td colspan="2">{Error}</td>
                  </tr>
                  <!-- END Error -->
                  <tr class="Controls">
                    <th colspan="2"></th>
                  </tr>
 
                  <tr class="Controls">
                    <th><strong>Usuario</strong></th>
 
                    <td><input id="Loginlogin" name="{login_Name}" maxlength="100" value="{login}" size="20"></td>
                  </tr>
 
                  <tr class="Controls">
                    <th><strong>Contraseña</strong></th>
 
                    <td><input id="Loginpassword" name="{password_Name}" maxlength="100" value="{password}" type="password" size="20"></td>
                  </tr>
 
                  <tr class="Bottom">
                    <td colspan="2" align="right">
                      <p align="center">
                      <!-- BEGIN Button Button_DoLogin --><input id="LoginButton_DoLogin" class="Button" name="{Button_Name}" value="Ingresar" type="submit"><!-- END Button Button_DoLogin --></p>
                    </td>
                  </tr>
                  <tr class="Bottom">
                    <td colspan="2">
					<div align="center">
						<a href="http://catastro.tierradelfuego.gov.ar:84/web_tdf_provincia/default.aspx" target="_blank" title="Cartografia General">Sistema de Información Territorial</a>
					</div>
                    </td>
                  </tr>					  
                </table>
                <a href="http://catastro.tierradelfuego.gov.ar:84/web_tdf_provincia/default.aspx" target="_blank" title="Cartografia General"><img id="Image1" name="Image1" alt="" align="middle" src="imagenes/login_abajo.jpg"></a></td>
            </tr>
          </table>
        </div>
      </form>
      <!-- END Record Login --></td>
  </tr>
</table>
<div>
	{tdf_footer} 
</div>

</body>
</html>
